name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Mypy
        run: mypy src

  backend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Pytest (unit only)
        run: pytest tests/ --ignore=tests/integration -q

  backend-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gargantua
          POSTGRES_PASSWORD: gargantua
          POSTGRES_DB: gargantua
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gargantua -d gargantua"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://gargantua:gargantua@localhost:5432/gargantua
      DATABASE_URL_ASYNC: postgresql+psycopg://gargantua:gargantua@localhost:5432/gargantua
      # Deterministic 32-byte test KEK (all zeros, base64).  Safe to commit
      # because it only ever protects the ephemeral CI Postgres.  Do NOT use
      # this value anywhere real.
      MASTER_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
      JWT_PRIVATE_KEY_PATH: ${{ github.workspace }}/secrets/jwt_private.pem
      JWT_PUBLIC_KEY_PATH: ${{ github.workspace }}/secrets/jwt_public.pem
      JWT_ISSUER: gargantua-ci
      JWT_AUDIENCE: gargantua-ci
      RUNTIME_ENV: dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Generate JWT keypair for tests
        run: |
          mkdir -p secrets
          gargantua-admin generate-jwt-keys --out-dir ./secrets
      - name: Pytest (integration)
        run: pytest tests/integration -q

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Vitest
        run: pnpm test
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Playwright e2e
        run: pnpm test:e2e

  package-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - name: Inspect metadata
        run: |
          pip install pkginfo
          python -c "import pkginfo, glob; [print(pkginfo.Wheel(w).license) for w in glob.glob('dist/*.whl')]"
