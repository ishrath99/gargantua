# Alembic configuration for gargantua.
#
# The real sqlalchemy.url comes from gargantua.settings.Settings.database_url
# (read inside src/gargantua/db/migrations/env.py).  The placeholder here is
# only used when alembic is invoked without that loader, e.g. from a test that
# calls `cfg.set_main_option("sqlalchemy.url", ...)` explicitly.

[alembic]
script_location = src/gargantua/db/migrations
prepend_sys_path = .
path_separator = os
version_path_separator = os

# When unset, env.py falls back to the Settings DSN.
sqlalchemy.url = postgresql+psycopg://gargantua:gargantua@localhost:5432/gargantua

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
